set -g mouse on

# Set ghostty tab title to tmux session name
set -g set-titles on
set -g set-titles-string "[tmux] #{session_name}"

# Pass extended key sequences (e.g. Shift+Enter) through to applications instead of stripping them
set -g extended-keys on
# Enable extended key support for xterm-compatible terminals (Ghostty identifies as xterm)
set -as terminal-features 'xterm*:extkeys'

# display pane_current_path as the pane title
set -g pane-border-status top
set -g pane-border-format "\t #{pane_index} #{pane_current_path}"

# Start windows and panes at 1 instead of 0
set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on

set -g status-style 'bg=#191724'
set -g status-left ''
set -g status-right '#[fg=#907aa9]#S'
set -g window-status-current-style 'bold'
# Current (active) window tab
set -g @tab_current_zoomed '#[bg=#191724]#[fg=#ebbcba]#[bg=#ebbcba]#[fg=#191724]#[bold] #I:#W #[bg=#191724]#[fg=#ebbcba]'
set -g @tab_current_normal  '#[bg=#191724]#[fg=#c4a7e7]#[bg=#c4a7e7]#[fg=#191724]#[bold] #I:#W #[bg=#191724]#[fg=#c4a7e7]'
set -g window-status-current-format '#{?window_zoomed_flag,#{@tab_current_zoomed},#{@tab_current_normal}}'
set -g window-status-style 'bg=#31748f,fg=#191724'
# Inactive window tab
set -g @tab_inactive_zoomed '#[bg=#191724]#[fg=#ebbcba]#[bg=#ebbcba]#[fg=#191724] #I:#W #[bg=#191724]#[fg=#ebbcba]'
set -g @tab_inactive_normal  '#[bg=#191724]#[fg=#31748f]#[bg=#31748f]#[fg=#191724] #I:#W #[bg=#191724]#[fg=#31748f]'
set -g window-status-format '#{?window_zoomed_flag,#{@tab_inactive_zoomed},#{@tab_inactive_normal}}'
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key D switch-client -t DB
bind-key O switch-client -t Obsidian

# Enable clipboard integration
set-option -g set-clipboard on

# Enable bracketed paste mode
set-option -g assume-paste-time 1

# Fix terminal capabilities for better paste handling
set-option -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"

# Enable focus events (helps with paste detection)
set-option -g focus-events on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'

